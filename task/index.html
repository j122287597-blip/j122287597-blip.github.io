<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>极简同步日程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); }
        body { background-color: #f2f2f7; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .active-scale:active { transform: scale(0.96); transition: 0.1s; }
        .priority-red { border-left: 6px solid #ff3b30; }
        .priority-orange { border-left: 6px solid #ff9500; }
        .priority-blue { border-left: 6px solid #007aff; }
        ::-webkit-scrollbar { display: none; }
        .urgent-blink { animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body class="p-4 md:p-10 pb-24 text-gray-900">

    <div class="max-w-2xl mx-auto">
        <!-- 1. 登录/同步私钥 -->
        <div id="setup-section" class="mb-8 p-8 glass rounded-[2.5rem] shadow-xl text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
            </div>
            <h2 class="text-2xl font-bold mb-2">多端同步日程</h2>
            <p class="text-sm text-gray-500 mb-6">输入私钥以同步电脑与手机数据</p>
            <div class="flex flex-col gap-4">
                <input type="password" id="userKey" class="w-full p-4 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500 transition-all outline-none text-center text-lg" placeholder="输入同步私钥">
                <button onclick="initApp()" class="w-full p-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg active-scale">开启同步</button>
            </div>
        </div>

        <!-- 2. 主界面 -->
        <div id="main-app" class="hidden animate-in fade-in duration-500">
            <header class="flex justify-between items-end mb-8 px-2">
                <div>
                    <div class="flex items-center gap-3">
                        <h1 class="text-4xl font-bold tracking-tight text-black">我的日程</h1>
                        <button onclick="logout()" class="text-[10px] bg-gray-200 text-gray-500 px-3 py-1 rounded-full active-scale uppercase font-bold tracking-widest">切换私钥</button>
                    </div>
                    <p id="current-date" class="text-gray-400 text-sm font-bold mt-1 uppercase"></p>
                </div>
                <button onclick="toggleAddModal()" class="w-12 h-12 bg-white text-blue-600 rounded-full shadow-lg border border-gray-100 flex items-center justify-center active-scale">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </button>
            </header>

            <!-- 统计 -->
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="glass p-5 rounded-[2rem]">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">待办任务</p>
                    <p id="stat-pending" class="text-3xl font-bold text-blue-600">0</p>
                </div>
                <div class="glass p-5 rounded-[2rem]">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">今日紧急</p>
                    <p id="stat-urgent" class="text-3xl font-bold text-red-500">0</p>
                </div>
            </div>

            <!-- 任务列表 -->
            <div id="task-list" class="space-y-4"></div>
            
            <div id="empty-state" class="hidden text-center py-20 text-gray-300">
                <p class="text-lg font-medium">暂无日程，享受生活吧</p>
            </div>
        </div>
    </div>

    <!-- 3. 新建任务弹窗 -->
    <div id="add-modal" class="fixed inset-0 bg-black/40 backdrop-blur-md hidden items-end md:items-center justify-center p-0 md:p-4 z-50">
        <div class="glass w-full max-w-lg p-8 rounded-t-[2.5rem] md:rounded-[2.5rem] shadow-2xl animate-in slide-in-from-bottom duration-300">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">新建日程</h2>
                <button onclick="toggleAddModal()" class="text-gray-400 font-bold text-xs uppercase tracking-widest">取消</button>
            </div>
            <div class="space-y-4">
                <input id="newTitle" type="text" placeholder="任务名称" class="w-full p-4 rounded-2xl border-none bg-gray-100/50 focus:bg-white ring-1 ring-gray-200 outline-none text-base">
                <textarea id="newNote" placeholder="备注内容 (可选)" class="w-full p-4 rounded-2xl border-none bg-gray-100/50 focus:bg-white ring-1 ring-gray-200 outline-none h-24 text-base"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 ml-1 uppercase">提醒时间</label>
                        <input id="newTime" type="datetime-local" class="w-full p-4 rounded-2xl border-none bg-gray-100/50 ring-1 ring-gray-200 outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 ml-1 uppercase">优先级</label>
                        <select id="newPriority" class="w-full p-4 rounded-2xl border-none bg-gray-100/50 ring-1 ring-gray-200 outline-none appearance-none text-sm">
                            <option value="blue">🔵 普通</option>
                            <option value="orange">🟠 重要</option>
                            <option value="red">🔴 紧急</option>
                        </select>
                    </div>
                </div>
                <button onclick="saveTask()" class="w-full p-5 bg-blue-600 text-white rounded-[1.5rem] font-bold shadow-xl active-scale mt-4 text-lg">确认保存</button>
            </div>
        </div>
    </div>

    <script>
    // --- 1. 配置区 ---
    const SUPABASE_URL = 'https://adjnxlkyviswfwvzamvw.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_s9jX2zCe3SQmM0gKJwDkQA_XKfL5hwX'; 
    const BARK_KEY = 'c3PjCeGWh7KpRBqyvZYxUD'; 
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUserKey = '';
    let notifiedTasks = new Set(); 

    // --- 2. 初始化 ---
    window.onload = () => {
        const now = new Date();
        document.getElementById('current-date').innerText = now.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'long' });
        
        const savedKey = localStorage.getItem('my_sync_key');
        if(savedKey) {
            document.getElementById('userKey').value = savedKey;
            setTimeout(initApp, 500);
        }

        // 优化点：频率改为 10 秒，并立即执行一次
        setInterval(() => {
            if(currentUserKey) {
                fetchTasks(); 
                checkAndNotify(); 
            }
        }, 10000); 
    };

    async function initApp() {
        currentUserKey = document.getElementById('userKey').value.trim();
        if(!currentUserKey) return alert("请输入私钥");
        localStorage.setItem('my_sync_key', currentUserKey);
        document.getElementById('setup-section').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        fetchTasks();
        checkAndNotify(); // 初始化时立刻检查一次
    }

    function logout() {
        if(confirm("确定要切换私钥吗？")) {
            localStorage.removeItem('my_sync_key');
            window.location.reload();
        }
    }

    // --- 3. 核心逻辑 ---
    async function fetchTasks() {
        const { data, error } = await supabaseClient
            .from('tasks')
            .select('*')
            .eq('user_id', currentUserKey)
            .order('target_time', { ascending: true });
        
        if (!error) {
            renderTasks(data);
            updateStats(data);
        }
    }

    async function saveTask() {
        const title = document.getElementById('newTitle').value;
        const timeInput = document.getElementById('newTime').value;
        if(!title || !timeInput) return alert("请填入标题和时间");

        const targetTimeISO = new Date(timeInput).toISOString();

        const { error } = await supabaseClient.from('tasks').insert([{
            user_id: currentUserKey,
            title,
            note: document.getElementById('newNote').value,
            target_time: targetTimeISO,
            priority: document.getElementById('newPriority').value,
            status: 'pending'
        }]);

        if(!error) {
            toggleAddModal();
            document.getElementById('newTitle').value = '';
            document.getElementById('newNote').value = '';
            fetchTasks();
            setTimeout(checkAndNotify, 1000); // 保存后 1 秒立刻预检
        }
    }

    async function completeTask(id) {
        const { error } = await supabaseClient.from('tasks').delete().eq('id', id);
        if(!error) fetchTasks();
    }

    // --- 4. Bark 通知逻辑 ---
    async function checkAndNotify() {
        if(!currentUserKey) return;
        const { data } = await supabaseClient.from('tasks').select('*').eq('user_id', currentUserKey).eq('status', 'pending');
        const now = new Date().getTime();
        
        data.forEach(task => {
            const taskTime = new Date(task.target_time).getTime();
            // 只要当前时间超过了任务时间，且在 10 分钟内，且没通知过
            if (now >= taskTime && (now - taskTime) < 600000) {
                if (!notifiedTasks.has(task.id)) {
                    sendBarkNotification(task);
                    notifiedTasks.add(task.id);
                }
            }
        });
    }

    function sendBarkNotification(task) {
        if(!BARK_KEY || BARK_KEY === '你的BARK_KEY') return;
        const title = encodeURIComponent("⏰ 提醒: " + task.title);
        const body = encodeURIComponent(task.note || "设定的时间到了！");
        // 这里增加了一个 level=timeSensitive (iOS 15+)
        const url = `https://api.day.app/${BARK_KEY}/${title}/${body}?group=日程&isArchive=1&sound=alarm&level=timeSensitive`;
        
        fetch(url)
            .then(res => console.log("Bark推送响应:", res))
            .catch(e => console.error("Bark推送失败:", e));
    }

    // --- 5. 渲染逻辑 (保持不变) ---
    function renderTasks(tasks) {
        const listDiv = document.getElementById('task-list');
        const empty = document.getElementById('empty-state');
        if(!tasks || tasks.length === 0) {
            listDiv.innerHTML = '';
            empty.classList.remove('hidden');
            return;
        }
        empty.classList.add('hidden');

        listDiv.innerHTML = tasks.map(t => {
            const taskDate = new Date(t.target_time);
            const diff = taskDate.getTime() - new Date().getTime();
            const isOverdue = diff < 0;
            const timeStr = taskDate.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
            const dateStr = taskDate.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
            return `
            <div class="glass p-5 rounded-[2rem] shadow-sm active-scale priority-${t.priority} ${t.priority==='red'&&!isOverdue?'urgent-blink':''} flex justify-between items-center">
                <div class="flex-1 pr-4">
                    <div class="font-bold text-lg text-gray-800 tracking-tight">${t.title}</div>
                    <div class="text-xs text-gray-400 mt-0.5 line-clamp-1">${t.note || '无备注'}</div>
                    <div class="mt-3 flex gap-2 items-center">
                        <span class="text-[9px] font-black px-2 py-0.5 bg-white/60 rounded-full text-gray-400 uppercase italic shadow-sm">
                            📅 ${dateStr} ${timeStr}
                        </span>
                        <span class="text-[10px] font-bold ${isOverdue?'text-red-500':'text-blue-500'}">
                            ${isOverdue ? '⚠️ 已过期' : '⏳ ' + formatDiff(diff)}
                        </span>
                    </div>
                </div>
                <button onclick="completeTask('${t.id}')" class="w-12 h-12 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center active:bg-blue-600 active:text-white transition-all shadow-inner">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </button>
            </div>`;
        }).join('');
    }

    function formatDiff(ms) {
        const mins = Math.floor(ms / 60000);
        const hours = Math.floor(mins / 60);
        const days = Math.floor(hours / 24);
        if (days > 0) return `${days}天${hours%24}时`;
        if (hours > 0) return `${hours}时${mins%60}分`;
        return `${Math.max(0, mins)}分钟`;
    }

    function updateStats(tasks) {
        document.getElementById('stat-pending').innerText = tasks.length;
        document.getElementById('stat-urgent').innerText = tasks.filter(t => t.priority === 'red').length;
    }

    function toggleAddModal() {
        const m = document.getElementById('add-modal');
        m.classList.toggle('hidden');
        m.classList.toggle('flex');
    }
</script>
</body>
</html>
